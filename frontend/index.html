<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Ativa - Academia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">Vital Ativa</h1>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="#" data-page="alunos" class="nav-link active">Alunos</a></li>
                    <li><a href="#" data-page="planos" class="nav-link">Planos</a></li>
                    <li><a href="#" data-page="instrutores" class="nav-link">Instrutores</a></li>
                    <li><a href="#" data-page="aulas" class="nav-link">Aulas</a></li>
                    <li><a href="#" data-page="matriculas" class="nav-link">Matrículas</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="page-header">
                <h2 class="page-title" id="pageTitle">Alunos</h2>
                <button class="btn btn-primary" id="btnNovo">+ Novo</button>
            </div>

            <div class="content" id="content">
                <div class="table-container" id="tableContainer">
                    <table class="table" id="dataTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <div class="empty-state" id="emptyState" style="display: none;">
                    <p>Nenhum registro encontrado.</p>
                </div>
            </div>
        </div>
    </main>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Novo Registro</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form class="form" id="dataForm">
                <div class="form-body" id="formFields"></div>
                <div class="form-footer">
                    <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script src="js/api/ApiClient.js"></script>
    <script src="js/services/AlunoService.js"></script>
    <script src="js/services/PlanoService.js"></script>
    <script src="js/services/InstrutorService.js"></script>
    <script src="js/services/AulaService.js"></script>
    <script src="js/services/MatriculaService.js"></script>
    <script src="js/components/TableComponent.js"></script>
    <script src="js/components/ModalComponent.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
